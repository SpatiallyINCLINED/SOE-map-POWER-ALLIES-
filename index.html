        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'Nigeria faces a complex and regionally differentiated ecological crisis — from oil pollution and mangrove degradation in the South-South, to desertification and Lake Chad recession in the North-East, gully erosion and land degradation in the South-East, savanna depletion and drought in the North-West and North-Central, and tropical rainforest loss across the South-West. These crises do not occur in a vacuum; they are shaped, sustained, or contested by a web of actors whose power, interests, and alliances determine ecological outcomes on the ground.<br />This study presents a comprehensive, nationwide multi-actor mapping exercise grounded in political ecology theory. Applying a dual analytical framework — the Power/Interest Grid and the Allies and Resistance Network Map — the research identifies, classifies, and georeferences 410 actors operating across all 36 states and the Federal Capital Territory of Nigeria. Actors span federal and state government ministries, regulatory agencies, academic and research institutions, civil society organisations, media bodies, traditional institutions, private sector operators, community groups, and international development partners. Each actor is coded by their level of power, degree of ecological interest, and their strategic positioning as a strong ally, potential ally, weak ally, or resistance centre within their specific ecological context.<br />The georeferenced dataset, visualised as an interactive map and structured as a searchable spreadsheet, reveals consistent national patterns: regulatory agencies frequently hold high power but exercise low interest; frontline communities bear the greatest ecological burden while possessing the least institutional power; and resistance to conservation is most entrenched where economic incentives — from oil extraction, logging, industrial agriculture, and urban development — intersect with weak enforcement and political capture. Across all zones, the study also surfaces unexpected allies, including traditional institutions, religious bodies, and media organisations, whose influence has been underutilised in ecological advocacy.<br />By producing the first spatially explicit, actor-level political ecology map covering all of Nigeria\'s geopolitical zones, this study offers environmental advocates, policymakers, and civil society organisations a strategic intelligence tool — one that moves beyond listing problems to mapping power, and beyond identifying stakeholders to understanding who can move whom, and where the real leverage for ecological justice lies.';
